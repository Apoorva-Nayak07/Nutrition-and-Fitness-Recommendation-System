version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: fitai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fitness-ai
    volumes:
      - mongodb_data:/data/db
    networks:
      - fitai-network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.backend
    container_name: fitai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/fitness-ai
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - JWT_EXPIRE=7d
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - mongodb
      - ml-service
    networks:
      - fitai-network

  # ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: ../docker/Dockerfile.ml
    container_name: fitai-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - fitai-network

  # Frontend
  frontend:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.frontend
    container_name: fitai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - fitai-network

networks:
  fitai-network:
    driver: bridge

volumes:
  mongodb_data:
